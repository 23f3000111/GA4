name: Daily Repository Update

permissions:
  contents: write

on:
  schedule:
    - cron: '17 4 * * *'   # fixed hour/minute
  workflow_dispatch:

jobs:
  update-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: 23f3000786@ds.study.iitm.ac.in - Daily Commit Step
        run: |
          echo "Last updated on $(date -u)" >> daily_update.log
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add daily_update.log
          git commit -m "Automated daily update - $(date -u)" || echo "No changes"
          git push
